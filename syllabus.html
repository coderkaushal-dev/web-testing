<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curriculum & Syllabus | Excess Ion Academy</title>
    
    <link href="./css/style.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="./js/firebase-config.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 overflow-x-hidden">

    <div id="header-placeholder"></div>

    <section class="pt-32 pb-20 px-6">
        <div class="max-w-6xl mx-auto">
            <div class="text-center mb-16">
                <div class="inline-flex items-center gap-2 bg-blue-500/10 text-blue-400 font-bold px-4 py-1.5 rounded-full text-xs mb-4 border border-blue-500/20 shadow-sm">
                    📚 Latest Academic Year
                </div>
                <h1 class="text-4xl sm:text-5xl font-extrabold mb-4">Curriculum & <span class="text-blue-500">Syllabus</span></h1>
                <p class="text-slate-400">Download official Board & Exam roadmaps to plan your studies efficiently.</p>
            </div>

            <div id="syllabus-container" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <p id="loading-text" class="text-slate-400 text-center col-span-full py-10">Fetching latest syllabus... <i class="fa-solid fa-spinner fa-spin ml-2"></i></p>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>
    <script src="./js/components.js"></script>
    <script src="./js/script.js"></script>
    
    <script>
        async function fetchSyllabus() {
            const container = document.getElementById('syllabus-container');
            const loadingText = document.getElementById('loading-text');

            try {
                // Fetching from 'syllabus' collection in Firebase
                const snapshot = await db.collection('syllabus').get();
                if (loadingText) loadingText.remove();
                
                if (snapshot.empty) {
                    container.innerHTML = `<p class="text-slate-500 text-center col-span-full py-10">No syllabus documents uploaded yet.</p>`;
                    return;
                }

                snapshot.forEach(doc => {
                    const data = doc.data();
                    container.innerHTML += `
                    <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl hover:border-blue-500 transition-all group shadow-lg">
                        <div class="flex justify-between items-start mb-4">
                            <span class="bg-blue-500/10 text-blue-400 text-[10px] font-bold px-3 py-1 rounded-full uppercase border border-blue-500/20">${data.class}</span>
                            <i class="fa-solid fa-list-check text-2xl text-slate-700 group-hover:text-blue-500 transition-colors"></i>
                        </div>
                        <h4 class="text-sm font-bold text-slate-400 uppercase tracking-widest">${data.board}</h4>
                        <h3 class="text-xl font-bold text-white mt-1 mb-6 leading-tight">${data.title}</h3>
                        <a href="${data.link}" target="_blank" class="flex items-center justify-center gap-2 w-full bg-slate-800 hover:bg-blue-600 text-white font-bold py-3 rounded-xl transition-all border border-slate-700 hover:border-blue-500">
                            <i class="fa-solid fa-download text-sm"></i> Download PDF
                        </a>
                    </div>`;
                });
            } catch (error) {
                console.error("Error fetching syllabus: ", error);
                if (loadingText) loadingText.remove();
                container.innerHTML = `<p class="text-red-400 text-center col-span-full">Connection error! Please check your network.</p>`;
            }
        }
        document.addEventListener('DOMContentLoaded', fetchSyllabus);
    </script>
</body>
</html>
