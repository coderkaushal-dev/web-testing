<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Tests | Excess Ion Academy</title>
    
    <link href="./css/style.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="./js/firebase-config.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 overflow-x-hidden">

    <div id="header-placeholder"></div>

    <section class="pt-32 pb-20 px-6">
        <div class="max-w-6xl mx-auto">
            <div class="text-center mb-16">
                <div class="inline-flex items-center gap-2 bg-amber-500/10 text-amber-400 font-bold px-4 py-1.5 rounded-full text-xs mb-4 border border-amber-500/20 shadow-sm">
                    📝 Real-time Evaluation
                </div>
                <h1 class="text-4xl sm:text-5xl font-extrabold mb-4">Online <span class="text-amber-500">Mock Tests</span></h1>
                <p class="text-slate-400">Attempt live tests, track your time, and check your all-India ranking.</p>
            </div>

            <div id="tests-container" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <p id="loading-text" class="text-slate-400 text-center col-span-full py-10">Fetching active tests... <i class="fa-solid fa-spinner fa-spin ml-2"></i></p>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>
    <script src="./js/components.js"></script>
    <script src="./js/script.js"></script>
    
    <script>
        async function fetchTests() {
            const container = document.getElementById('tests-container');
            const loadingText = document.getElementById('loading-text');

            try {
                // Fetching from 'online_tests' collection in Firebase
                const snapshot = await db.collection('online_tests').get();
                if (loadingText) loadingText.remove();
                
                if (snapshot.empty) {
                    container.innerHTML = `<p class="text-slate-500 text-center col-span-full py-10">No active tests right now. Keep preparing!</p>`;
                    return;
                }

                snapshot.forEach(doc => {
                    const data = doc.data();
                    container.innerHTML += `
                    <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl hover:border-amber-500 transition-all group shadow-lg flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start mb-4">
                                <span class="bg-amber-500/10 text-amber-400 text-[10px] font-bold px-3 py-1 rounded-full uppercase border border-amber-500/20">${data.class}</span>
                                <span class="text-[10px] bg-slate-800 text-slate-300 px-2 py-1 rounded border border-slate-700"><i class="fa-regular fa-clock text-amber-400 mr-1"></i> ${data.duration}</span>
                            </div>
                            <h4 class="text-sm font-bold text-slate-400 uppercase tracking-widest">${data.subject}</h4>
                            <h3 class="text-xl font-bold text-white mt-1 mb-4 leading-tight">${data.title}</h3>
                        </div>
                        <a href="${data.link}" target="_blank" class="flex items-center justify-center gap-2 w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl transition-all shadow-md mt-4">
                            Attempt Now <i class="fa-solid fa-arrow-right ml-1"></i>
                        </a>
                    </div>`;
                });
            } catch (error) {
                console.error("Error fetching tests: ", error);
                if (loadingText) loadingText.remove();
                container.innerHTML = `<p class="text-red-400 text-center col-span-full">Connection error! Please check your network.</p>`;
            }
        }
        document.addEventListener('DOMContentLoaded', fetchTests);
    </script>
</body>
</html>
