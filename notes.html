<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Notes | Excess Ion Academy</title>
    <link href="./css/style.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100">
    <div id="header-placeholder"></div>

    <section class="pt-32 pb-20 px-6">
        <div class="max-w-6xl mx-auto">
            <div class="text-center mb-16">
                <h1 class="text-4xl sm:text-5xl font-extrabold mb-4">Chapter-wise <span class="text-emerald-500">Notes</span></h1>
                <p class="text-slate-400">Class 1st to 12th | CBSE & BSEB | Competitive Exams</p>
            </div>

            <div id="notes-container" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>
    <script src="./js/components.js"></script>
    <script>
        // --- YE AAPKA DATABASE HAI ---
        const notesDB = [
            { class: "10th", subject: "Physics", title: "Light - Reflection & Refraction", link: "https://drive.google.com/..." },
            { class: "12th", subject: "Chemistry", title: "Electrochemistry Full Notes", link: "https://drive.google.com/..." },
            { class: "9th", subject: "Maths", title: "Number Systems - NCERT Solutions", link: "https://drive.google.com/..." },
            { class: "NEET", subject: "Biology", title: "Human Physiology Masterclass", link: "https://drive.google.com/..." }
        ];

        const container = document.getElementById('notes-container');
        notesDB.forEach(note => {
            container.innerHTML += `
            <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl hover:border-emerald-500 transition-all group">
                <div class="flex justify-between items-start mb-4">
                    <span class="bg-emerald-500/10 text-emerald-400 text-[10px] font-bold px-3 py-1 rounded-full uppercase">${note.class}</span>
                    <i class="fa-solid fa-file-pdf text-2xl text-slate-700 group-hover:text-red-500 transition-colors"></i>
                </div>
                <h4 class="text-sm font-bold text-slate-400 uppercase tracking-widest">${note.subject}</h4>
                <h3 class="text-xl font-bold text-white mt-1 mb-6 leading-tight">${note.title}</h3>
                <a href="${note.link}" target="_blank" class="flex items-center justify-center gap-2 w-full bg-slate-800 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl transition-all">
                    <i class="fa-solid fa-download text-sm"></i> Download PDF
                </a>
            </div>`;
        });
    </script>
</body>
</html>
